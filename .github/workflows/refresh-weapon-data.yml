name: Refresh weapon data

on:
  schedule:
    - cron: "17 9 * * 1"
      timezone: "America/Chicago"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-weapon-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Install scraper system tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes sqlite3 unzip

      - name: Test scraper
        run: npm run data:test

      - name: Scrape current recommendations
        run: npm run data:scrape

      - name: Enrich and audit data
        run: |
          npm run data:enrich
          npm run data:audit

      - name: Verify production build
        run: npm run build

      - name: Commit refreshed data
        id: commit
        run: |
          if git diff --quiet -- data/god-rolls.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Weapon data is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/god-rolls.json
          git commit -m "Refresh weekly weapon data"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Vercel deployment
        if: steps.commit.outputs.changed == 'true' && env.VERCEL_DEPLOY_HOOK_URL != ''
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$VERCEL_DEPLOY_HOOK_URL"
